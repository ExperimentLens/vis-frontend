# Standalone nginx config for the unified local docker stack (root docker-compose.yml).
# Unlike the production nginx.conf, this routes /api and /experiments DIRECTLY to the
# vis-api container (service name "vis-api" on the shared docker network), bypassing the
# ExtremeXP ABAC/Keycloak proxy. Use for local testing only.

server {
    listen 80;

    # API -> vis-api (Spring Boot, container port 8080)
    location /api {
        proxy_pass http://vis-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Experiments endpoints -> vis-api
    location /experiments {
        proxy_pass http://vis-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
